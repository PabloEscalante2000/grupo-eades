<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=https://eadespsicoterapia.com/" />
  <title>Grupo EADES</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background-color: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }

    h1 {
      color: #f1f5f9;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    p {
      color: #64748b;
      font-size: 1rem;
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 3rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #334155;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { background-color: #334155; }
      40%            { background-color: #3b82f6; }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Grupo EADES</span>
    <h1>Página en proceso</h1>
    <p>Estamos trabajando en algo. Volvé pronto.</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
